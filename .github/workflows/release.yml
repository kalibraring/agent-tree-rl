name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: read
      id-token: write
    outputs:
      release-commit: ${{ steps.release-identity.outputs.commit }}

    steps:
      - name: Check out immutable tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Require an exact version tag on main
        id: release-identity
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          metadata = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          expected = "v" + metadata["project"]["version"]
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} must equal {expected!r}")
          PY
          tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
          git show-ref --verify --quiet refs/remotes/origin/main
          git merge-base --is-ancestor "${tag_commit}" refs/remotes/origin/main
          echo "commit=${tag_commit}" >> "${GITHUB_OUTPUT}"

      - name: Install pinned build tooling
        run: >-
          python -m pip install --disable-pip-version-check --require-hashes
          --requirement requirements-build-ci.txt

      - name: Check build-tool lock parity
        run: python scripts/check_build_lock.py

      - name: Check immutable deployment pins
        run: python scripts/check_deployment_pins.py

      - name: Check public-release safety
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/check_public_release.py

      - name: Verify synthetic controller mechanics
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python examples/synthetic_terminal.py verify

      - name: Run source, controller, and installed-distribution proofs
        env:
          OUTPUT_DIR: ${{ github.workspace }}/dist
          PYTHONDONTWRITEBYTECODE: "1"
        run: scripts/verify_release.sh

      - name: Validate distribution contents
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path, PurePosixPath
          import os
          import tarfile
          import zipfile

          dist = Path("dist")
          wheels = sorted(dist.glob("*.whl"))
          sdists = sorted(dist.glob("*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit("release must contain exactly one wheel and one source archive")

          forbidden = {
              ".env", ".git", ".venv", "__pycache__", "backups", "data",
              "dist", "private", "secrets", "var",
          }

          def validate_names(names: list[str], artifact: Path) -> None:
              for raw_name in names:
                  name = PurePosixPath(raw_name)
                  if name.is_absolute() or ".." in name.parts:
                      raise SystemExit(f"unsafe archive member in {artifact}: {raw_name}")
                  if any(part.lower() in forbidden for part in name.parts):
                      raise SystemExit(f"private/generated archive member in {artifact}: {raw_name}")

          with zipfile.ZipFile(wheels[0]) as archive:
              validate_names(archive.namelist(), wheels[0])
              metadata_names = [name for name in archive.namelist() if name.endswith(".dist-info/METADATA")]
              if len(metadata_names) != 1:
                  raise SystemExit("wheel must contain exactly one METADATA file")
              metadata = archive.read(metadata_names[0]).decode("utf-8")

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          if f"Version: {version}\n" not in metadata:
              raise SystemExit("wheel metadata version does not match release tag")

          with tarfile.open(sdists[0], "r:gz") as archive:
              validate_names(archive.getnames(), sdists[0])
          PY

      - name: Install pinned SBOM generator
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.44.0

      - name: Generate and inspect the wheel SBOM
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          SYFT_CHECK_FOR_APP_UPDATE: "false"
        run: |
          mkdir -p sbom-root sbom-scan
          python -m zipfile -e dist/*.whl sbom-root
          version="${RELEASE_TAG#v}"
          sbom="dist/agent-tree-rl-${RELEASE_TAG}.spdx.json"
          "${{ steps.syft.outputs.cmd }}" scan \
            --source-name agent-tree-rl \
            --source-version "${version}" \
            "dir:${GITHUB_WORKSPACE}/sbom-root" \
            --output "spdx-json=${sbom}"
          cp "${sbom}" sbom-scan/
          python scripts/check_public_release.py \
            --root sbom-scan \
            --skip-git-history

      - name: Write release checksums
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          dist = Path("dist")
          wheels = sorted(dist.glob("*.whl"))
          sdists = sorted(dist.glob("*.tar.gz"))
          sboms = sorted(dist.glob("*.spdx.json"))
          if len(wheels) != 1 or len(sdists) != 1 or len(sboms) != 1:
              raise SystemExit("release must contain one wheel, source archive, and SBOM")
          artifacts = wheels + sdists + sboms
          checksum_lines = [
              f"{sha256(path.read_bytes()).hexdigest()}  {path.name}"
              for path in artifacts
          ]
          (dist / "SHA256SUMS").write_text("\n".join(checksum_lines) + "\n", encoding="utf-8")
          PY

      - name: Attest release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.spdx.json

      - name: Stage verified release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.spdx.json
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 5

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-dist
          path: dist

      - name: Re-verify tag identity and artifact handoff
        env:
          EXPECTED_RELEASE_COMMIT: ${{ needs.build.outputs.release-commit }}
          GH_TOKEN: ${{ github.token }}
        run: |
          read -r object_sha object_type < <(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" \
              --jq '.object.sha + " " + .object.type'
          )
          while [[ "${object_type}" == "tag" ]]; do
            read -r object_sha object_type < <(
              gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}" \
                --jq '.object.sha + " " + .object.type'
            )
          done
          if [[ "${object_type}" != "commit" || \
                "${object_sha}" != "${EXPECTED_RELEASE_COMMIT}" ]]; then
            echo "release tag moved or does not resolve to the verified build commit" >&2
            exit 1
          fi
          (cd dist && sha256sum --check SHA256SUMS)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          dist/*.whl dist/*.tar.gz dist/*.spdx.json dist/SHA256SUMS
          --repo "${GITHUB_REPOSITORY}"
          --target "${{ needs.build.outputs.release-commit }}"
          --title "Agent Tree RL ${GITHUB_REF_NAME}"
          --generate-notes
          --verify-tag
