name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out immutable tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Require an exact version tag on main
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          metadata = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          expected = "v" + metadata["project"]["version"]
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} must equal {expected!r}")
          PY
          tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
          git show-ref --verify --quiet refs/remotes/origin/main
          git merge-base --is-ancestor "${tag_commit}" refs/remotes/origin/main

      - name: Install pinned build tooling
        run: >-
          python -m pip install --disable-pip-version-check
          build==1.3.0 ruff==0.15.20 setuptools==80.9.0 wheel==0.45.1

      - name: Check public-release safety
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/check_public_release.py

      - name: Verify synthetic controller mechanics
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python examples/synthetic_terminal.py verify

      - name: Run source, controller, and installed-distribution proofs
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: scripts/verify_release.sh

      - name: Build wheel and source distribution
        run: python -m build --no-isolation --outdir dist

      - name: Validate distribution contents and write checksums
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path, PurePosixPath
          import os
          import tarfile
          import zipfile

          dist = Path("dist")
          wheels = sorted(dist.glob("*.whl"))
          sdists = sorted(dist.glob("*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit("release must contain exactly one wheel and one source archive")

          forbidden = {
              ".env", ".git", ".venv", "__pycache__", "backups", "data",
              "dist", "private", "secrets", "var",
          }

          def validate_names(names: list[str], artifact: Path) -> None:
              for raw_name in names:
                  name = PurePosixPath(raw_name)
                  if name.is_absolute() or ".." in name.parts:
                      raise SystemExit(f"unsafe archive member in {artifact}: {raw_name}")
                  if any(part.lower() in forbidden for part in name.parts):
                      raise SystemExit(f"private/generated archive member in {artifact}: {raw_name}")

          with zipfile.ZipFile(wheels[0]) as archive:
              validate_names(archive.namelist(), wheels[0])
              metadata_names = [name for name in archive.namelist() if name.endswith(".dist-info/METADATA")]
              if len(metadata_names) != 1:
                  raise SystemExit("wheel must contain exactly one METADATA file")
              metadata = archive.read(metadata_names[0]).decode("utf-8")

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          if f"Version: {version}\n" not in metadata:
              raise SystemExit("wheel metadata version does not match release tag")

          with tarfile.open(sdists[0], "r:gz") as archive:
              validate_names(archive.getnames(), sdists[0])

          artifacts = wheels + sdists
          checksum_lines = [
              f"{sha256(path.read_bytes()).hexdigest()}  {path.name}"
              for path in artifacts
          ]
          (dist / "SHA256SUMS").write_text("\n".join(checksum_lines) + "\n", encoding="utf-8")
          PY

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          dist/*.whl dist/*.tar.gz dist/SHA256SUMS
          --repo "${GITHUB_REPOSITORY}"
          --title "Agent Tree RL ${GITHUB_REF_NAME}"
          --generate-notes
          --verify-tag
