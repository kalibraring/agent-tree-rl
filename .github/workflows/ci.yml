name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned package tooling
        run: >-
          python -m pip install --disable-pip-version-check
          build==1.3.0 ruff==0.15.20 setuptools==80.9.0 wheel==0.45.1

      - name: Check public-release safety
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/check_public_release.py

      - name: Verify synthetic controller mechanics
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python examples/synthetic_terminal.py verify

      - name: Run source, controller, and installed-distribution proofs
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: scripts/verify_release.sh

  container-smoke:
    name: Container evidence probe
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build the reference image
        run: docker build --file deploy/Dockerfile --tag agent-tree-rl:ci .

      - name: Verify the image carries its license notice
        run: >-
          docker run --rm
          --entrypoint /usr/bin/test
          agent-tree-rl:ci -r /app/LICENSE

      - name: Run the allowlisted probe inside the image
        run: >-
          docker run --rm
          --entrypoint /app/agent_tree_rl/workers/evidence_probe.py
          agent-tree-rl:ci health
